[_]
schema-version = "0.2"

# ── Buildpack configuration ──────────────────────────────
[[io.buildpacks.build.env]]
name  = "BP_CPYTHON_VERSION"
value = "3.11.*"

# Exclude dev/test files from the production image
[io.buildpacks]
  [[io.buildpacks.group]]
  uri = "paketo-buildpacks/python"

  [io.buildpacks.build]
  exclude = ["tests/", "*.md", ".pytest_cache/"]
