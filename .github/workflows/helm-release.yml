# ──────────────────────────────────────────────────────────
# Release Helm Charts
# ──────────────────────────────────────────────────────────
# Automatically packages the Helm chart, creates a GitHub Release
# with the .tgz asset, and updates the index.yaml on the gh-pages branch.
#
# Requirements:
# 1. Enable GitHub Pages in your repository settings and set the
#    source to the "gh-pages" branch.
# 2. Ensure GitHub Actions has Read & Write permissions for the repo.

name: Release Helm Charts

on:
  push:
    branches:
      - master
    paths:
      - "helm/**"

jobs:
  release:
    # Depending on default settings, these permissions might be required
    permissions:
      contents: write
      pages: write

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          charts_dir: helm
