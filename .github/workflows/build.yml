# ──────────────────────────────────────────────────────────
# The Cortex — Build & Push Container Images (Buildpacks)
# ──────────────────────────────────────────────────────────
# Triggers on push to main or any tag starting with 'v'.
# Builds two images using Cloud Native Buildpacks (pack CLI):
#   1. cortex-frontend  (Vite/React → nginx via Paketo web-servers)
#   2. cortex-backend   (FastAPI via Paketo python)
# Pushes to GitHub Container Registry (ghcr.io).

name: Build Containers

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # ── Frontend ──────────────────────────────────────────────
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.7.4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build frontend image
        run: |
          pack build ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ steps.tag.outputs.tag }} \
            --builder paketobuildpacks/builder-jammy-base \
            --path . \
            --env "VITE_API_URL=" \
            --publish=${{ github.event_name != 'pull_request' }}

      - name: Tag latest
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ steps.tag.outputs.tag }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ steps.tag.outputs.tag }} \
                     ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest

  # ── Backend ───────────────────────────────────────────────
  backend:
    name: Build Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.7.4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build backend image
        run: |
          pack build ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${{ steps.tag.outputs.tag }} \
            --builder paketobuildpacks/builder-jammy-base \
            --path ./backend \
            --publish=${{ github.event_name != 'pull_request' }}

      - name: Tag latest
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${{ steps.tag.outputs.tag }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${{ steps.tag.outputs.tag }} \
                     ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:latest
