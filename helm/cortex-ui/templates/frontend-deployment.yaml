{{- if .Values.frontend.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    app.kubernetes.io/name: cortex-ui-frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: cortex-ui-frontend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cortex-ui-frontend
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # ── Init: write config.js from env vars ──────────────
      initContainers:
        - name: inject-env
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              cat > /config-vol/config.js <<EOF
              window.__RUNTIME_CONFIG__ = {
                VITE_API_URL: "${VITE_API_URL:-}",
                VITE_KEYCLOAK_REALM_URL: "${VITE_KEYCLOAK_REALM_URL:-}",
                VITE_KEYCLOAK_CLIENT_ID: "${VITE_KEYCLOAK_CLIENT_ID:-}",
                VITE_NO_AUTH: "${VITE_NO_AUTH:-false}",
              };
              EOF
              echo "inject-env: config.js written"; cat /config-vol/config.js
          {{- if .Values.frontend.env }}
          env:
            {{- range $key, $value := .Values.frontend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          volumeMounts:
            - name: runtime-config
              mountPath: /config-vol

      containers:
        - name: frontend
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.global.imagePrefix }}/{{ .Values.frontend.image.name }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy | default .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          {{- if .Values.frontend.env }}
          env:
            {{- range $key, $value := .Values.frontend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          volumeMounts:
            - name: runtime-config
              mountPath: /workspace/dist/config.js
              subPath: config.js
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20

      volumes:
        - name: runtime-config
          emptyDir: {}
{{- end -}}
