# ==============================================================================
# Process Spawner Helm Values
# ==============================================================================

# -- Global image settings -----------------------------------------------------
global:
  imageRegistry: ghcr.io
  # Replace with your actual GitHub username/organization
  imagePrefix: edgy-solutions/cortex-ui
  imagePullPolicy: IfNotPresent
  # imagePullSecrets:
  #   - name: ghcr-pull-secret

# -- Frontend Service (Vite + React) -------------------------------------------
frontend:
  enabled: true
  replicaCount: 1
  image:
    name: frontend
    tag: latest
    # Override global pull policy
    # pullPolicy: Always

  service:
    type: ClusterIP
    port: 8080

  ingress:
    enabled: false
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    hosts:
      - host: cortex-ui.local
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls: []
    #  - secretName: cortex-ui-tls
    #    hosts:
    #      - cortex-ui.local

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
