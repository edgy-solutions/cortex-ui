# ==============================================================================
# Process Spawner Helm Values
# ==============================================================================

# -- Global image settings -----------------------------------------------------
global:
  imageRegistry: ghcr.io
  # Replace with your actual GitHub username/organization
  imagePrefix: edgy-solutions/process-spawner
  imagePullPolicy: IfNotPresent
  # imagePullSecrets:
  #   - name: ghcr-pull-secret

# -- Frontend Service (Vite + React) -------------------------------------------
frontend:
  enabled: true
  replicaCount: 1
  image:
    name: frontend
    tag: latest
    # Override global pull policy
    # pullPolicy: Always

  service:
    type: ClusterIP
    port: 8080

  ingress:
    enabled: false
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    hosts:
      - host: process-spawner.local
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls: []
    #  - secretName: process-spawner-tls
    #    hosts:
    #      - process-spawner.local

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# -- Backend Service (FastAPI + BAML) ------------------------------------------
backend:
  enabled: true
  replicaCount: 1
  image:
    name: backend
    tag: latest

  service:
    type: ClusterIP
    port: 8000

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- External Dependencies (Invincible Agent integration) ------------------------
# This configuration tells the backend how to connect to the invincible-agent
# components (Postgres, Dagster, Ontology/DataHub engines).
invincibleAgent:
  # The Helm release name used when installing the invincible-agent chart.
  # This is used to automatically construct the internal Kubernetes DNS names.
  releaseName: "invincible-agent"
  
  # Set to the namespace where invincible-agent is deployed
  # (Leave empty if deployed in the same namespace)
  namespace: ""

  # Optional URL overrides (useful if not using standard K8s DNS naming)
  urls:
    ontologyService: ""    # e.g., "http://custom-engine-o:8084"
    datahubService: ""     # e.g., "http://custom-engine-d:8085"
    dagsterWebserver: ""   # e.g., "http://custom-dagster:3000"

  # Database configuration matching the invincible-agent postgres instance
  postgresql:
    database: "iagent"
    username: "iagent"

# -- Secrets -------------------------------------------------------------------
secrets:
  # Your OpenRouter API key for LLM access
  openrouterApiKey: ""
  
  # Must match what was provided to invincible-agent (postgresql.auth.password)
  postgresPassword: "changeme-iagent"
