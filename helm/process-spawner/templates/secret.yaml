apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-backend-secrets
  labels:
    app.kubernetes.io/name: process-spawner-backend
type: Opaque
stringData:
  OPENROUTER_API_KEY: {{ .Values.secrets.openrouterApiKey | quote }}
  
  # ── Construct Database URI ──
  {{- $svcSuffix := "" -}}
  {{- if .Values.invincibleAgent.namespace -}}
    {{- $svcSuffix = printf ".%s.svc.cluster.local" .Values.invincibleAgent.namespace -}}
  {{- end -}}
  {{- $pgHost := printf "%s-postgresql%s" .Values.invincibleAgent.releaseName $svcSuffix -}}
  {{- $pgDb := .Values.invincibleAgent.postgresql.database -}}
  {{- $pgUser := .Values.invincibleAgent.postgresql.username -}}
  {{- $pgPass := .Values.secrets.postgresPassword -}}
  
  DATABASE_URL: "postgresql+asyncpg://{{ $pgUser }}:{{ $pgPass }}@{{ $pgHost }}:5432/{{ $pgDb }}"
